name: Lint, test and deploy on "push"

on:
  push:
    branches:
      - main
      - "**"   # runs on every branch push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4
      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      # Install dependencies
      - name: Install dependencies
        run: npm ci
  lint:
      runs-on: ubuntu-latest
      needs: build
      steps:
        # Checkout repo
        - name: Checkout code
          uses: actions/checkout@v4
        # Setup Node
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20
        # Install dependencies
        - name: Install dependencies
          run: npm ci
                # Lint
        - name: Run lint
          run: npm run lint 
  test:
      runs-on: ubuntu-latest
      needs: build
      steps:
        # Checkout repo
        - name: Checkout code
          uses: actions/checkout@v4
        # Setup Node
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20
        # Install dependencies
        - name: Install dependencies
          run: npm ci
        # Test
        - name: Run tests
          run: npm test         
  deploy:
      runs-on: ubuntu-latest
      needs: [lint, test]
      steps:
        # Checkout repo
        - name: Checkout code
          uses: actions/checkout@v4
        # Setup Node
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20
        # Install dependencies
        - name: Install dependencies
          run: npm ci
        # Build (good practice before deploy)
        - name: Build project
          run: npm run build
        # Simulate deployment
        - name: Deploy (simulation)
          run: echo "🚀 Simulating deployment..."


      
      
