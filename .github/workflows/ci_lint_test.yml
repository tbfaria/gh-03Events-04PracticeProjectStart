name: CI - Lint & Test

on:
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubunto-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
